<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select List</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    /* Constrain entire iframe content to 400px - Trello board bar container is always full width */
    html {
      width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 20px;
      margin: 0 auto;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    h3 {
      margin-top: 0;
    }
    .list-checkbox-list {
      list-style: none;
      margin: 0 0 12px;
      padding: 0;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 8px;
    }
    .list-checkbox-item {
      padding: 6px 0;
    }
    .list-checkbox-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .list-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toggle-all-btn {
      background: none;
      border: none;
      color: #0079bf;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 0;
      margin-bottom: 8px;
      width: auto;
    }
    .toggle-all-btn:hover {
      text-decoration: underline;
    }
    button.primary-btn {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 3px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button.primary-btn:hover {
      background-color: #026aa7;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: white;
    }
    #error {
      display: none;
      color: #d32f2f;
      margin-top: 10px;
      padding: 10px;
      background-color: #ffebee;
      border-radius: 3px;
    }
    .board-bar-content {
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="board-bar-content">
    <h3>Generate Board Report v<span id="version"></span></h3>
    <p>Select lists to generate a report for:</p>
    <button type="button" class="toggle-all-btn" id="toggle-all-btn" style="display: none;">Select All</button>
    <ul id="list-checkbox-container" class="list-checkbox-list">
      <li>Loading lists...</li>
    </ul>
    <button type="button" id="generate-btn" class="primary-btn" disabled>Generate Report</button>
    <div id="loading">Generating report, please wait...</div>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="./constants.js"></script>
  <script src="../shared/auth-helpers.js"></script>
  <script src="../shared/trello-api.js"></script>
  <script src="./list-report-helpers.js"></script>
  <script src="./list-report-api.js"></script>
  <script src="./list-report-report.js"></script>
  <script src="./power-up.js"></script>
  <script>
    var t = TrelloPowerUp.iframe({
      appKey: APP_KEY,
      appName: APP_NAME,
    });

    var listCheckboxContainer = document.getElementById('list-checkbox-container');
    var toggleAllBtn = document.getElementById('toggle-all-btn');
    var generateBtn = document.getElementById('generate-btn');
    var loadingDiv = document.getElementById('loading');
    var errorDiv = document.getElementById('error');
    var versionSpan = document.getElementById('version');

    versionSpan.textContent = VERSION;

    async function loadLists() {
      try {
        const token = await getAuthToken(t);
        if (!token) {
          errorDiv.textContent = 'Not authorized. Please authorize the Power-Up first.';
          errorDiv.style.display = 'block';
          return;
        }

        const lists = await ListReport.api.fetchBoardLists(t, token);

        listCheckboxContainer.innerHTML = lists
          .map(
            (list) =>
              '<li class="list-checkbox-item">' +
              '<label>' +
              '<input type="checkbox" class="list-checkbox" data-list-id="' + list.id + '" data-list-name="' + escapeHtml(list.name) + '">' +
              '<span>' + escapeHtml(list.name) + '</span>' +
              '</label>' +
              '</li>'
          )
          .join('');

        toggleAllBtn.style.display = 'inline-block';
        toggleAllBtn.textContent = 'Select All';
        generateBtn.disabled = false;
      } catch (error) {
        console.error('Error loading lists:', error);
        errorDiv.textContent = 'Error loading lists: ' + error.message;
        errorDiv.style.display = 'block';
      }
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    toggleAllBtn.addEventListener('click', function() {
      var checkboxes = listCheckboxContainer.querySelectorAll('.list-checkbox');
      var allChecked = Array.from(checkboxes).every(function(cb) { return cb.checked; });
      checkboxes.forEach(function(cb) { cb.checked = !allChecked; });
      toggleAllBtn.textContent = allChecked ? 'Select All' : 'Deselect All';
    });

    generateBtn.addEventListener('click', async function() {
      var checked = listCheckboxContainer.querySelectorAll('.list-checkbox:checked');
      if (!checked.length) {
        errorDiv.textContent = 'Please select at least one list.';
        errorDiv.style.display = 'block';
        return;
      }

      var selectedLists = Array.from(checked).map(function(cb) {
        return { id: cb.getAttribute('data-list-id'), name: cb.getAttribute('data-list-name') };
      });

      generateBtn.disabled = true;
      listCheckboxContainer.querySelectorAll('.list-checkbox').forEach(function(cb) { cb.disabled = true; });
      toggleAllBtn.disabled = true;
      loadingDiv.style.display = 'block';
      errorDiv.style.display = 'none';

      try {
        await generateReport(t, selectedLists);

        setTimeout(function() {
          t.closeBoardBar();
        }, 500);
      } catch (error) {
        console.error('Error generating report:', error);
        errorDiv.textContent = 'Error generating report: ' + error.message;
        errorDiv.style.display = 'block';
        generateBtn.disabled = false;
        listCheckboxContainer.querySelectorAll('.list-checkbox').forEach(function(cb) { cb.disabled = false; });
        toggleAllBtn.disabled = false;
        loadingDiv.style.display = 'none';
      }
    });

    loadLists();
  </script>
</body>
</html>
