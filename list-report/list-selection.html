<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select List</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    /* Constrain entire iframe content to 400px - Trello board bar container is always full width */
    html {
      width: 400px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 20px;
      margin: 0 auto;
      width: 400px;
      max-width: 400px;
      box-sizing: border-box;
    }
    h3 {
      margin-top: 0;
    }
    .list-checkbox-list {
      list-style: none;
      margin: 0 0 12px;
      padding: 0;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 8px;
    }
    .list-checkbox-item {
      padding: 6px 0;
    }
    .list-checkbox-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .list-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toggle-all-btn {
      background: none;
      border: none;
      color: #0079bf;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 0;
      margin-bottom: 8px;
      width: auto;
    }
    .toggle-all-btn:hover {
      text-decoration: underline;
    }
    button.primary-btn {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 3px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button.primary-btn:hover {
      background-color: #026aa7;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: white;
    }
    #error {
      display: none;
      color: #d32f2f;
      margin-top: 10px;
      padding: 10px;
      background-color: #ffebee;
      border-radius: 3px;
    }
    .board-bar-content {
      max-width: 400px;
      margin: 0 auto;
    }
    .report-type-radio {
      margin: 0 0 16px;
      padding: 0;
      list-style: none;
    }
    .report-type-radio li {
      padding: 6px 0;
    }
    .report-type-radio label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .report-type-radio input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .card-journey-panel {
      margin-bottom: 12px;
    }
    .card-journey-panel .form-row {
      margin-bottom: 12px;
    }
    .card-journey-panel label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .card-journey-panel select {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      box-sizing: border-box;
    }
    .list-selection-panel,
    .card-journey-panel {
      display: none;
    }
    .list-selection-panel.visible,
    .card-journey-panel.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="board-bar-content">
    <h3>Generate Board Report v<span id="version"></span></h3>

    <p style="margin-bottom: 8px;">Report Type</p>
    <ul class="report-type-radio" id="report-type-radios">
      <li>
        <label>
          <input type="radio" name="report-type" value="list-report" id="report-type-list" checked>
          <span>List Report</span>
        </label>
      </li>
      <li>
        <label>
          <input type="radio" name="report-type" value="card-journey" id="report-type-card-journey">
          <span>Card Journey</span>
        </label>
      </li>
    </ul>

    <div id="list-selection-panel" class="list-selection-panel visible">
      <p>Select lists to generate a report for:</p>
      <button type="button" class="toggle-all-btn" id="toggle-all-btn" style="display: none;">Select All</button>
      <ul id="list-checkbox-container" class="list-checkbox-list">
        <li>Loading lists...</li>
      </ul>
    </div>

    <div id="card-journey-panel" class="card-journey-panel">
      <p>Select From and To lists to count card moves:</p>
      <div class="form-row">
        <label for="from-list-select">From</label>
        <select id="from-list-select">
          <option value="">— Select list —</option>
        </select>
      </div>
      <div class="form-row">
        <label for="to-list-select">To</label>
        <select id="to-list-select">
          <option value="">— Select list —</option>
        </select>
      </div>
    </div>

    <button type="button" id="generate-btn" class="primary-btn" disabled>Generate Report</button>
    <div id="loading">Generating report, please wait...</div>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="./constants.js"></script>
  <script src="../shared/auth-helpers.js"></script>
  <script src="../shared/trello-api.js"></script>
  <script src="./list-report-helpers.js"></script>
  <script src="./list-report-api.js"></script>
  <script src="./list-report-report.js"></script>
  <script src="./card-journey-report.js"></script>
  <script src="./power-up.js"></script>
  <script src="./list-selection.js"></script>
</body>
</html>
